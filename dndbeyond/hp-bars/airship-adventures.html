<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DDB DM Overlay</title>
</head>
<body style="margin:0;background:transparent;font-family:sans-serif;">

<div id="app"></div>

<script>
/* ============================
   CONFIG — PUT YOUR IDS HERE
============================ */
const CHARACTER_IDS = [
    "141139271",
    "141138928",
    "141139103",
    "141139220",
    "141139167",
    "141139039",
    "160974318"
];

/* ============================
   FETCH CHARACTER
============================ */
const API_BASE = "https://dnd-obs-tools-a7qur8hvi-revengesystem-9895s-projects.vercel.app/api/character";

async function fetchCharacter(id) {
    try {
        const res = await fetch(`${API_BASE}/${id}`);
        const json = await res.json();
        const data = json.data;

        const maxHp = Number(calculateMaxHp(data) ?? 1);
        const damage = Number(data.removedHitPoints ?? 0);
        const tempHp = Number(data.temporaryHitPoints ?? 0);
        const hp = maxHp - damage;

        return {
            name: data.name,
            hp,
            maxHp,
            tempHp,
            debug: {
                con: getStatBreakdown(data, 3),
                hp: getHpBreakdown(data)
            }
        };
    } catch (err) {
        console.error("Failed:", id, err);
        return null;
    }
}

/* ============================
   STAT SYSTEM (FIXED)
============================ */

function getAllModifiers(data) {
  return [
    ...(data.modifiers?.race || []),
    ...(data.modifiers?.class || []),
    ...(data.modifiers?.background || []),
    ...(data.modifiers?.feat || []),
    ...(data.modifiers?.item || [])
  ];
}

function getStatName(statId) {
  return {
    1: "strength",
    2: "dexterity",
    3: "constitution",
    4: "intelligence",
    5: "wisdom",
    6: "charisma"
  }[statId];
}

function getAllOptions(data) {
  return [
    ...(data.choices?.race || []),
    ...(data.choices?.class || []),
    ...(data.choices?.background || []),
    ...(data.choices?.feat || []),
    ...(data.choices?.item || []),
    ...(data.options?.race || []),
    ...(data.options?.class || []),
    ...(data.options?.background || []),
    ...(data.options?.feat || []),
    ...(data.options?.item || [])
  ];
}

function getChoiceIdSuffix(choiceId) {
  return String(choiceId || "").split("-").pop();
}

function isSelectedChoiceModifier(data, modifier) {
  const modifierId = String(modifier.id || "");
  if (!modifierId) return false;

  return getAllOptions(data).some(choice =>
    getChoiceIdSuffix(choice.id) === modifierId
  );
}

function isActiveModifier(data, modifier) {
  return modifier.isGranted !== false || isSelectedChoiceModifier(data, modifier);
}

function isStatModifier(modifier, statId) {
  const statName = getStatName(statId);
  return (
    modifier.statId === statId ||
    modifier.entityId === statId ||
    modifier.subType === `${statName}-score`
  );
}

function getStatModifiers(data, statId) {
  const mods = getAllModifiers(data);

  let total = 0;

  for (const m of mods) {
    if (!isActiveModifier(data, m)) continue;

    const value = Number(m.value ?? m.fixedValue ?? 0);
    if (!value) continue;

    if (!isStatModifier(m, statId)) continue;

    total += value;
  }

  return total;
}

function getStat(data, statId) {
  const base = data.stats?.find(s => s.id === statId)?.value ?? 10;

  const rawBonus =
    data.bonusStats?.find(s => s.id === statId)?.value;

  const bonus = rawBonus == null ? 0 : rawBonus;

  const override =
    data.overrideStats?.find(s => s.id === statId)?.value;

  const modifierBonus = getStatModifiers(data, statId);

  if (override != null) return override;

  return base + bonus + modifierBonus;
}

/* ============================
   DEBUG
============================ */

function getStatBreakdown(data, statId) {
  const base = data.stats?.find(s => s.id === statId)?.value ?? 10;

  const rawBonus =
    data.bonusStats?.find(s => s.id === statId)?.value;

  const bonus = rawBonus == null ? 0 : rawBonus;

  const override =
    data.overrideStats?.find(s => s.id === statId)?.value;

  const mods = getAllModifiers(data);

  const contributions = [];
  let modifierTotal = 0;

  for (const m of mods) {
    if (!isActiveModifier(data, m)) continue;

    const val = Number(m.value ?? m.fixedValue ?? 0);
    if (!val) continue;

    if (!isStatModifier(m, statId)) continue;

    modifierTotal += val;

    contributions.push({
      source: m.friendlySubtypeName || m.subType || "unknown",
      value: val,
      selectedChoice: m.isGranted === false
    });
  }

  const total =
    override != null
      ? override
      : base + bonus + modifierTotal;

  return {
    base,
    bonus,
    modifierTotal,
    contributions,
    total
  };
}

/* ============================
   HP SYSTEM
============================ */

function getModifiers(data, subType) {
  return getAllModifiers(data)
    .filter(m => m.subType === subType && isActiveModifier(data, m))
    .reduce((sum, m) => {
      const val = m.value ?? m.fixedValue ?? 0;
      return sum + Number(val || 0);
    }, 0);
}

function getLevel(data) {
  if (!data.classes) return 1;
  return data.classes.reduce((sum, cls) => sum + (cls.level || 0), 0);
}

function getHpBreakdown(data) {
  const level = getLevel(data);

  const conTotal = getStat(data, 3);
  const conMod = Math.floor((conTotal - 10) / 2);

  const perLevel = getModifiers(data, "hit-points-per-level");
  const flat = getModifiers(data, "hit-points");

  const base = data.baseHitPoints ?? 0;
  const bonus = Number(data.bonusHitPoints ?? 0);

  return {
    level,
    base,
    bonus,
    conMod,
    conBonus: conMod * level,
    perLevelBonus: perLevel * level,
    flatBonus: flat,
    total:
      base +
      bonus +
      (conMod * level) +
      (perLevel * level) +
      flat
  };
}

function calculateMaxHp(data) {
  if (data.overrideHitPoints) {
    return data.overrideHitPoints;
  }

  const level = getLevel(data);
  const conTotal = getStat(data, 3);
  const conMod = Math.floor((conTotal - 10) / 2);

  const base = data.baseHitPoints ?? 0;
  const bonus = Number(data.bonusHitPoints ?? 0);

  const perLevelBonus = getModifiers(data, "hit-points-per-level");
  //const flatBonus = getModifiers(data, "hit-points");
const flatBonus = 0;
  return (
    base +
    bonus +
    (conMod * level) +
    (perLevelBonus * level) +
    flatBonus
  );
}

/* ============================
   RENDER
============================ */

function render(chars) {
    const app = document.getElementById("app");

    app.innerHTML = chars.map(c => {
        const percent = c.maxHp > 0 ? (c.hp / c.maxHp) * 100 : 0;

        let color = "#4caf50";
        if (percent < 30) color = "#e53935";
        else if (percent < 70) color = "#fbc02d";

        return `
            <div style="margin:10px;">
                <div style="font-weight:bold;color:white;margin-bottom:4px;">
                    ${c.name}
                </div>

                <div style="
                    position:relative;
                    background:#333;
                    border-radius:6px;
                    height:24px;
                    overflow:hidden;
                ">
                    <div style="
                        width:${percent}%;
                        background:${color};
                        height:100%;
                        transition:width 0.5s ease;
                    "></div>

                    <div style="
                        position:absolute;
                        width:100%;
                        text-align:center;
                        top:0;
                        left:0;
                        line-height:24px;
                        font-weight:bold;
                        color:white;
                    ">
                        ${c.hp} / ${c.maxHp}
                        ${c.tempHp ? `(+${c.tempHp})` : ""}
                    </div>
                </div>

                <div style="
                    font-size:11px;
                    color:#ccc;
                    margin-top:4px;
                    background:rgba(0,0,0,0.4);
                    padding:6px;
                    border-radius:4px;
                ">
                    <div><strong>CON:</strong> ${c.debug.con.total}</div>
                    <div>
                        ${c.debug.con.base} (base)
                        ${c.debug.con.bonus ? `+ ${c.debug.con.bonus}` : ""}
                        ${c.debug.con.contributions.map(x => `+ ${x.value}`).join(" ")}
                    </div>
                </div>
            </div>
        `;
    }).join("");
}

/* ============================
   LOOP
============================ */

async function update() {
    const chars = await Promise.all(
        CHARACTER_IDS.map(fetchCharacter)
    );

    render(chars.filter(Boolean));
}

update();
setInterval(update, 10000);

</script>

</body>
</html>
